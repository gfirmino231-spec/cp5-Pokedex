<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkpoint Project</title>

  <!-- FONTES -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
  <span class="nav-logo">CP 5</span>
  <ul class="nav-links">
    <li><a href="#inicio">Inicio</a></li>
    <li><a href="#integrantes">Integrantes</a></li>
    <li><a href="#pokemons">Pokemons</a></li>
    <li><a href="#cartas">Cartas</a></li>
  </ul>
</nav>

<!-- SECTION 1 -->
<section id="inicio">
  <div class="hero-box">
    <h1 class="hero-title">Checkpoint<br>Project</h1>
    <button class="btn-start" onclick="scrollToIntegrantes()">Start</button>
  </div>
</section>

<!-- SECTION 2 -->
<section id="integrantes">
  <h2 class="section-title">Choose your character</h2>
  <div class="members-box">
    <div class="member-item"><span class="member-arrow">▶</span><span>Nome - RM 000001</span></div>
    <div class="member-item"><span class="member-arrow">▶</span><span>Nome - RM 000002</span></div>
    <div class="member-item"><span class="member-arrow">▶</span><span>Nome - RM 000003</span></div>
    <div class="member-item"><span class="member-arrow">▶</span><span>Nome - RM 000004</span></div>
  </div>
</section>

<!-- SECTION 3 -->
<section id="pokemons">
  <h2 class="section-title">Descubra os pokemons</h2>

  <div class="pokemons-layout">
    <div class="filter-list" id="filterList">
      <button class="filter-btn active" data-type="todos">▶ Todos</button>
      <button class="filter-btn" data-type="agua">▶ Água</button>
      <button class="filter-btn" data-type="fogo">▶ Fogo</button>
    </div>

    <div class="pokemon-grid" id="pokemonGrid"></div>
  </div>
</section>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <span class="modal-close" id="modalClose">✕</span>
    <h3 id="modalName"></h3>
    <div id="modalInfo"></div>
  </div>
</div>

<!-- SECTION 4 -->
<section id="cartas">
  <h2 class="section-title">Crie sua carta</h2>

  <input type="text" id="cardName" placeholder="Nome">
  <input type="text" id="cardHP" placeholder="HP">
  <button onclick="updateCard()">Enviar</button>

  <div id="previewName"></div>
  <div id="previewHP"></div>
</section>

<!-- JS -->
<script src="main.js"></script>
</body>
</html>
